name: Build and Release

on:
  release:
    types: [published]

# This is critical for softprops/action-gh-release to work
permissions:
  contents: write

env:
  PROJECT_PATH: 'DeskQuit/DeskQuit.csproj'

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract Version
      id: extract_version
      run: |
        $tag = "${{ github.event.release.tag_name }}"
        if ($tag.StartsWith("v")) { $tag = $tag.Substring(1) }
        echo "VERSION=$tag" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Publish App (Windows)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:PublishTrimmed=true `
          -o publish_output

    - name: Create ZIP Archive
      run: |
        $version = "${{ steps.extract_version.outputs.VERSION }}"
        $archiveName = "DeskQuit-win-x64-v$version.zip"
        Compress-Archive -Path publish_output\* -DestinationPath $archiveName
      shell: pwsh

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: DeskQuit-win-x64-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Extract Version
      id: extract_version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        if [[ "$TAG" == v* ]]; then TAG="${TAG:1}"; fi
        echo "VERSION=$TAG" >> $GITHUB_OUTPUT
      shell: bash

    - name: Publish App (Linux)
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} \
          -c Release \
          -r linux-x64 \
          --self-contained true \
          -p:PublishSingleFile=true \
          -p:IncludeNativeLibrariesForSelfExtract=true \
          -p:PublishTrimmed=true \
          -o publish_output

    - name: Create ZIP Archive
      run: |
        cd publish_output
        zip -r ../DeskQuit-linux-x64-v${{ steps.extract_version.outputs.VERSION }}.zip ./*
      shell: bash

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: DeskQuit-linux-x64-*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
